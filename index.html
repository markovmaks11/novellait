<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Новенький — История гангстера</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cover">
    <div class="cover-bg"></div>
    <div class="cover-overlay"></div>
    <div class="cyber-grid"></div>
    <div class="rain"></div>

    <div class="settings-btn" id="settingsBtn">
        <div class="settings-icon">⚙️</div>
    </div>

    <div class="title-block">
        <div class="title-3d">
            <span class="title-char" data-char="Н">Н</span>
            <span class="title-char" data-char="О">О</span>
            <span class="title-char" data-char="В">В</span>
            <span class="title-char" data-char="Е">Е</span>
            <span class="title-char" data-char="Н">Н</span>
            <span class="title-char" data-char="Ь">Ь</span>
            <span class="title-char" data-char="К">К</span>
            <span class="title-char" data-char="И">И</span>
            <span class="title-char" data-char="Й">Й</span>
        </div>
        <div class="title-sub">HISTORY OF A GANGSTER</div>

        <div class="start-btn" id="startGameBtn">
            <div class="cylinder">
                <div class="chamber-hole"></div>
                <div class="trigger"></div>
            </div>
            <div class="btn-text">▶ НАЧАТЬ</div>
            <div class="btn-pulse"></div>
        </div>
        
        <div class="episodes-btn" id="episodesBtn">
            <div class="episodes-btn-text">📜 СПИСОК СЕРИЙ</div>
        </div>
    </div>
</div>

<div class="quote-of-day" id="quoteOfDay"></div>

<div class="episodes-panel" id="episodesPanel">
    <div class="episodes-header">
        <span class="episodes-title">⚡ ВЫБЕРИ СЕРИЮ ⚡</span>
        <button class="close-episodes" id="closeEpisodesBtn">✕</button>
    </div>
    <div class="episodes-list" id="episodesList"></div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <span class="settings-title">⚙️ НАСТРОЙКИ</span>
        <button class="close-settings" id="closeSettingsBtn">✕</button>
    </div>
    <div class="settings-content">
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">🎵</span>
                <span id="musicLabel">Фоновая музыка</span>
            </div>
            <label class="toggle-switch" onclick="event.stopPropagation()">
                <input type="checkbox" id="musicToggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">🔊</span>
                <span id="volumeLabel">Громкость</span>
            </div>
            <div class="volume-control" onclick="event.stopPropagation()">
                <span class="volume-icon">🔉</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
                <span class="volume-icon">🔊</span>
                <span class="volume-value" id="volumeValue">50%</span>
            </div>
        </div>
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">🌐</span>
                <span id="languageLabel">Язык / Language</span>
            </div>
            <label class="toggle-switch" onclick="event.stopPropagation()">
                <input type="checkbox" id="languageToggle">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">🎨</span>
                <span id="themeLabel">Тема</span>
            </div>
            <select id="themeSelect" class="theme-select" onclick="event.stopPropagation()">
                <option value="dark">🌑 Тёмная</option>
                <option value="rose">🌸 Розовый неон</option>
                <option value="gold">💛 Золотая мафия</option>
                <option value="blue">💙 Синий нуар</option>
            </select>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
